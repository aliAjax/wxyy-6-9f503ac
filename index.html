<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考古现场拼碎片</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <header class="header">
      <div>
        <p class="eyebrow">Field Lab Puzzle</p>
        <h1>考古现场拼碎片</h1>
      </div>
      <div class="stats">
        <span>时间 <strong id="timeLeft">90</strong></span>
        <span>挖掘 <strong id="digCount">0</strong></span>
        <span>完整度 <strong id="progress">0%</strong></span>
      </div>
    </header>

    <section id="levelSelect" class="level-select">
      <h2>选择修复任务</h2>
      <div class="level-list">
        <button class="level-card" data-level="bowl">
          <div class="level-icon bowl-icon"></div>
          <div class="level-info">
            <h3>陶碗修复</h3>
            <p>4 片碎片 · 90 秒 · 初级</p>
          </div>
        </button>
        <button class="level-card" data-level="tile">
          <div class="level-icon tile-icon"></div>
          <div class="level-info">
            <h3>瓦当修复</h3>
            <p>6 片碎片 · 120 秒 · 中级</p>
          </div>
        </button>
        <button class="level-card" data-level="mirror">
          <div class="level-icon mirror-icon"></div>
          <div class="level-info">
            <h3>青铜镜修复</h3>
            <p>9 片碎片 · 180 秒 · 高级</p>
          </div>
        </button>
      </div>
    </section>

    <section id="gameArea" class="layout hidden">
      <section class="dig-site">
        <div class="section-title">
          <h2>探方 · <span id="levelName">陶碗</span></h2>
          <button id="startBtn" type="button">开始挖掘</button>
        </div>
        <div id="grid" class="grid"></div>
      </section>

      <section class="lab">
        <div class="section-title">
          <h2>修复台</h2>
          <button id="restartBtn" type="button">重来</button>
        </div>
        <div class="workbench">
          <div id="target" class="target bowl-target">
          </div>
          <div id="pieces" class="pieces"></div>
        </div>
      </section>

      <aside class="notes">
        <h2>现场记录</h2>
        <div id="log" class="log"></div>
      </aside>
    </section>

    <section id="result" class="result hidden"></section>

    <button id="backBtn" type="button" class="back-btn hidden">← 返回选择任务</button>
  </main>

  <script src="app.js"></script>
</body>
</html>
