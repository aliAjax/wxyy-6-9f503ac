<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考古现场拼碎片</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <header class="header">
      <div>
        <p class="eyebrow">Field Lab Puzzle</p>
        <h1>考古现场拼碎片</h1>
      </div>
      <div class="header-actions">
        <button id="archiveBtn" type="button" class="archive-btn">修复档案</button>
        <button id="tutorialBtn" type="button" class="tutorial-btn">📖 教学</button>
        <div class="stats">
          <span>时间 <strong id="timeLeft">90</strong></span>
          <span>挖掘 <strong id="digCount">0</strong></span>
          <span>完整度 <strong id="progress">0%</strong></span>
        </div>
      </div>
    </header>

    <section id="levelSelect" class="level-select">
      <div class="level-select-header">
        <h2>选择修复任务</h2>
        <div class="level-select-actions">
          <button id="openEditorBtn" type="button" class="editor-entry-btn">🛠️ 关卡编辑器</button>
        </div>
      </div>

      <div id="levelPreview" class="level-preview hidden">
        <button id="closePreviewBtn" type="button" class="close-preview-btn" aria-label="关闭预览">&times;</button>
        <div class="preview-content">
          <div class="preview-left">
            <div id="previewIcon" class="preview-icon level-icon"></div>
            <div class="preview-basic">
              <h3 id="previewName" class="preview-name"></h3>
              <span id="previewDifficulty" class="preview-difficulty"></span>
            </div>
          </div>
          <div class="preview-right">
            <div class="preview-section">
              <h4 class="preview-section-title">器物说明</h4>
              <p id="previewDescription" class="preview-description"></p>
            </div>
            <div class="preview-stats">
              <div class="preview-stat">
                <span class="preview-stat-label">碎片数量</span>
                <strong id="previewPieceCount" class="preview-stat-value"></strong>
              </div>
              <div class="preview-stat">
                <span class="preview-stat-label">倒计时</span>
                <strong id="previewTimeLimit" class="preview-stat-value"></strong>
              </div>
              <div class="preview-stat">
                <span class="preview-stat-label">最佳成绩</span>
                <strong id="previewBestScore" class="preview-stat-value"></strong>
              </div>
            </div>
            <div class="preview-section">
              <h4 class="preview-section-title">可用工具</h4>
              <div id="previewTools" class="preview-tools"></div>
            </div>
            <div class="preview-actions">
              <button id="previewStartBtn" type="button" class="preview-start-btn">🎮 开始修复</button>
            </div>
          </div>
        </div>
      </div>

      <div id="presetLevels" class="level-list-section">
        <h3 class="section-subtitle">官方关卡</h3>
        <div class="level-list">
        </div>
      </div>
      <div id="customLevelsSection" class="level-list-section hidden">
        <h3 class="section-subtitle">自定义关卡</h3>
        <div id="customLevelList" class="level-list">
        </div>
      </div>
    </section>

    <section id="levelEditor" class="level-editor hidden">
      <div class="editor-header">
        <h2>🛠️ 关卡编辑器</h2>
        <div class="editor-header-actions">
          <button id="editorBackBtn" type="button" class="secondary-btn">← 返回</button>
        </div>
      </div>

      <div class="editor-layout">
        <div class="editor-panel">
          <h3>基础设置</h3>
          <div class="form-group">
            <label for="editorLevelName">关卡名称</label>
            <input type="text" id="editorLevelName" maxlength="20" placeholder="例如：神秘玉琮">
          </div>
          <div class="form-group">
            <label for="editorDescription">说明文字</label>
            <textarea id="editorDescription" rows="3" maxlength="200" placeholder="关卡背景说明..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="editorTimeLimit">倒计时（秒）</label>
              <input type="number" id="editorTimeLimit" min="30" max="600" value="120">
            </div>
            <div class="form-group">
              <label for="editorGridSize">探方尺寸</label>
              <select id="editorGridSize">
                <option value="16">4 × 4</option>
                <option value="25" selected>5 × 5</option>
                <option value="36">6 × 6</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="editorPieceName">碎片名称</label>
              <input type="text" id="editorPieceName" maxlength="10" value="碎片">
            </div>
            <div class="form-group">
              <label for="editorSnapRadius">贴合半径</label>
              <input type="number" id="editorSnapRadius" min="30" max="150" value="60">
            </div>
          </div>
          <div class="form-group">
            <label>器物外观样式</label>
            <div class="style-presets">
              <button type="button" class="style-preset-btn bowl-style active" data-style="bowl" title="陶碗样式">🍯</button>
              <button type="button" class="style-preset-btn tile-style" data-style="tile" title="瓦当样式">🏺</button>
              <button type="button" class="style-preset-btn mirror-style" data-style="mirror" title="铜镜样式">🪞</button>
              <button type="button" class="style-preset-btn jade-style" data-style="jade" title="玉器样式">💎</button>
            </div>
          </div>
        </div>

        <div class="editor-panel">
          <h3>碎片管理 <span class="piece-count-badge" id="pieceCountBadge">0</span></h3>
          <div class="editor-piece-actions">
            <button id="addPieceBtn" type="button" class="editor-btn">+ 添加碎片</button>
            <button id="clearPiecesBtn" type="button" class="editor-btn danger">清空碎片</button>
          </div>
          <div id="pieceListEditor" class="piece-list-editor"></div>
        </div>

        <div class="editor-panel editor-visual-panel">
          <h3>探方编辑</h3>
          <p class="editor-hint" id="digHint">点击探方格放置选中碎片的埋藏位置，再次点击移除。</p>
          <div id="editorGrid" class="editor-grid"></div>
        </div>

        <div class="editor-panel editor-visual-panel">
          <h3>修复台编辑</h3>
          <p class="editor-hint" id="slotHint">在目标区域内拖动设置碎片槽位，双击槽位可旋转角度。</p>
          <div class="editor-workbench">
            <div id="editorTarget" class="editor-target">
              <div id="editorTargetInner" class="editor-target-inner"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="editor-footer">
        <div id="validationResult" class="validation-result"></div>
        <div class="editor-footer-actions">
          <button id="validateBtn" type="button" class="editor-btn">✓ 校验配置</button>
          <button id="previewBtn" type="button" class="editor-btn">🎮 预览试玩</button>
          <button id="saveLevelBtn" type="button" class="editor-btn primary">💾 保存关卡</button>
          <button id="exportLevelBtn" type="button" class="editor-btn">📤 导出JSON</button>
          <button id="importLevelBtn" type="button" class="editor-btn">📥 导入JSON</button>
          <input type="file" id="importFileInput" accept=".json" style="display:none">
        </div>
      </div>
    </section>

    <section id="gameArea" class="layout hidden">
      <div class="mobile-tabs">
        <button class="mobile-tab-btn active" data-tab="dig">⛏️ 探方</button>
        <button class="mobile-tab-btn" data-tab="repair">🔧 修复</button>
        <button class="mobile-tab-btn" data-tab="notes">📝 记录</button>
      </div>
      <section class="dig-site">
        <div class="section-title">
          <h2>探方 · <span id="levelName">陶碗</span></h2>
          <div class="section-actions">
            <button id="hintBtn" type="button" class="hint-btn">提示</button>
            <button id="startBtn" type="button">开始挖掘</button>
          </div>
        </div>
        <p id="levelDescription" class="level-description hidden"></p>

        <div class="tools-panel">
          <button id="probeBtn" type="button" class="tool-btn" data-tool="probe">
          </button>
          <button id="brushBtn" type="button" class="tool-btn" data-tool="brush">
          </button>
          <button id="compassBtn" type="button" class="tool-btn" data-tool="compass">
          </button>
        </div>

        <div id="grid" class="grid"></div>
        <div id="compassIndicator" class="compass-indicator hidden">
          <div class="compass-arrow"></div>
          <div class="compass-distance"></div>
        </div>
      </section>

      <section class="lab">
        <div class="section-title">
          <h2>修复台</h2>
          <div class="section-actions">
            <button id="focusBtn" type="button" class="lab-focus-btn">⛶ 全屏</button>
            <button id="restartBtn" type="button">重来</button>
          </div>
        </div>
        <div class="workbench">
          <div id="target" class="target">
          </div>
          <div id="pieces" class="pieces"></div>
        </div>
      </section>

      <aside class="notes">
        <h2>现场记录</h2>
        <div id="log" class="log"></div>
      </aside>
    </section>

    <section id="result" class="result hidden"></section>

    <button id="backBtn" type="button" class="back-btn hidden">← 返回选择任务</button>
  </main>

  <div id="archiveModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>修复档案</h2>
        <button id="closeArchiveBtn" type="button" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="archive-tabs">
          <button class="tab-btn active" data-tab="recent">最近记录</button>
          <button class="tab-btn" data-tab="best">最佳成绩</button>
        </div>
        <div id="recentTab" class="tab-content active">
          <div id="recentRecords" class="records-list"></div>
        </div>
        <div id="bestTab" class="tab-content">
          <div id="bestRecords" class="records-list"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="clearArchiveBtn" type="button" class="clear-btn">清空记录</button>
      </div>
    </div>
  </div>

  <div id="tutorialOverlay" class="tutorial-overlay hidden">
    <div id="tutorialSpotlight" class="tutorial-spotlight"></div>
    <div id="tutorialTooltip" class="tutorial-tooltip">
      <div class="tutorial-step-indicator"></div>
      <p class="tutorial-text"></p>
      <div class="tutorial-actions">
        <button type="button" class="tutorial-skip-btn">跳过教学</button>
        <button type="button" class="tutorial-next-btn">下一步</button>
      </div>
    </div>
  </div>

  <div id="confirmModal" class="modal hidden">
    <div class="modal-content confirm-modal">
      <div class="modal-body">
        <p class="confirm-message">确定要清空所有修复记录吗？此操作无法撤销。</p>
      </div>
      <div class="modal-footer">
        <button id="cancelClearBtn" type="button" class="secondary-btn">取消</button>
        <button id="confirmClearBtn" type="button" class="danger-btn">确认清空</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
