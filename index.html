<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考古现场拼碎片</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <header class="header">
      <div>
        <p class="eyebrow">Field Lab Puzzle</p>
        <h1>考古现场拼碎片</h1>
      </div>
      <div class="header-actions">
        <button id="archiveBtn" type="button" class="archive-btn">修复档案</button>
        <div class="stats">
          <span>时间 <strong id="timeLeft">90</strong></span>
          <span>挖掘 <strong id="digCount">0</strong></span>
          <span>完整度 <strong id="progress">0%</strong></span>
        </div>
      </div>
    </header>

    <section id="levelSelect" class="level-select">
      <h2>选择修复任务</h2>
      <div class="level-list">
        <button class="level-card" data-level="bowl">
          <div class="level-icon bowl-icon"></div>
          <div class="level-info">
            <h3>陶碗修复</h3>
            <p>4 片碎片 · 90 秒 · 初级</p>
          </div>
        </button>
        <button class="level-card" data-level="tile">
          <div class="level-icon tile-icon"></div>
          <div class="level-info">
            <h3>瓦当修复</h3>
            <p>6 片碎片 · 120 秒 · 中级</p>
          </div>
        </button>
        <button class="level-card" data-level="mirror">
          <div class="level-icon mirror-icon"></div>
          <div class="level-info">
            <h3>青铜镜修复</h3>
            <p>9 片碎片 · 180 秒 · 高级</p>
          </div>
        </button>
      </div>
    </section>

    <section id="gameArea" class="layout hidden">
      <section class="dig-site">
        <div class="section-title">
          <h2>探方 · <span id="levelName">陶碗</span></h2>
          <button id="startBtn" type="button">开始挖掘</button>
        </div>
        <div id="grid" class="grid"></div>
      </section>

      <section class="lab">
        <div class="section-title">
          <h2>修复台</h2>
          <button id="restartBtn" type="button">重来</button>
        </div>
        <div class="workbench">
          <div id="target" class="target bowl-target">
          </div>
          <div id="pieces" class="pieces"></div>
        </div>
      </section>

      <aside class="notes">
        <h2>现场记录</h2>
        <div id="log" class="log"></div>
      </aside>
    </section>

    <section id="result" class="result hidden"></section>

    <button id="backBtn" type="button" class="back-btn hidden">← 返回选择任务</button>
  </main>

  <div id="archiveModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>修复档案</h2>
        <button id="closeArchiveBtn" type="button" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="archive-tabs">
          <button class="tab-btn active" data-tab="recent">最近记录</button>
          <button class="tab-btn" data-tab="best">最佳成绩</button>
        </div>
        <div id="recentTab" class="tab-content active">
          <div id="recentRecords" class="records-list"></div>
        </div>
        <div id="bestTab" class="tab-content">
          <div id="bestRecords" class="records-list"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="clearArchiveBtn" type="button" class="clear-btn">清空记录</button>
      </div>
    </div>
  </div>

  <div id="confirmModal" class="modal hidden">
    <div class="modal-content confirm-modal">
      <div class="modal-body">
        <p class="confirm-message">确定要清空所有修复记录吗？此操作无法撤销。</p>
      </div>
      <div class="modal-footer">
        <button id="cancelClearBtn" type="button" class="secondary-btn">取消</button>
        <button id="confirmClearBtn" type="button" class="danger-btn">确认清空</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
